syntax = "proto3";

package foldforge.orchestrator.v1;

import "google/protobuf/struct.proto";
import "google/protobuf/timestamp.proto";
import "foldforge/common/v1/common.proto";

option go_package = "github.com/FoldForge/proto/gen/go/foldforge/orchestrator/v1;orchestratorv1";

// Orchestrator: accepts a workflow DAG and drives sidecars to completion.
service OrchestratorService {
  rpc SubmitWorkflow(SubmitWorkflowRequest) returns (Workflow);
  rpc GetWorkflow(GetWorkflowRequest) returns (Workflow);
  rpc ListWorkflows(ListWorkflowsRequest) returns (ListWorkflowsResponse);
  rpc StreamWorkflowEvents(StreamWorkflowEventsRequest) returns (stream WorkflowEvent);
  rpc CancelWorkflow(GetWorkflowRequest) returns (Workflow);
  // Re-queue a FAILED workflow: its FAILED steps go back to QUEUED (and their
  // downstream re-runs), while SUCCEEDED steps keep their artifacts and are
  // skipped. Errors with FAILED_PRECONDITION if the workflow is not FAILED.
  rpc RetryWorkflow(GetWorkflowRequest) returns (Workflow);

  // Per-user API-key auth (the gateway is stateless and has no DB, so it
  // delegates key lookup to the orchestrator which owns Postgres). The gateway
  // sends the SHA-256 hex of the presented bearer token — never the raw key —
  // and caches the result for a short TTL so this isn't a per-request hop.
  rpc AuthenticateApiKey(AuthenticateApiKeyRequest) returns (AuthenticateApiKeyResponse);
  // Atomically count one submission against a principal's quota and report
  // whether it is allowed. Separate from AuthenticateApiKey so reads (GET/SSE)
  // authenticate without consuming quota; only SubmitWorkflow consumes it. The
  // count is a single atomic DB update so it is correct across gateway replicas.
  rpc ConsumeQuota(ConsumeQuotaRequest) returns (ConsumeQuotaResponse);

  // Billing (prepaid credits). The orchestrator owns the credit ledger (the
  // gateway is stateless), so balance/history reads are RPCs here. The DEBIT
  // itself is not a separate RPC: it happens atomically inside SubmitWorkflow
  // (which owns the new workflow id used as the debit's idempotency key), gated
  // by the server's billing config. These two are read-only, for the console's
  // billing page + balance widget.
  rpc GetBalance(GetBalanceRequest) returns (GetBalanceResponse);
  rpc ListLedger(ListLedgerRequest) returns (ListLedgerResponse);
}

// Gateway → orchestrator: validate an API key by its SHA-256 hex digest.
message AuthenticateApiKeyRequest {
  string key_hash = 1; // lowercase sha256 hex of the raw bearer token
}

message AuthenticateApiKeyResponse {
  bool allowed = 1;         // true when the key exists and is active
  string principal = 2;     // owner/tenant label, for logging + quota scoping
  string deny_reason = 3;   // human-readable reason when allowed=false
}

// Gateway → orchestrator: count one submission against the key's quota. Keyed by
// the SHA-256 hex (the quota counter lives on the key row, a single atomic UPDATE
// — correct across gateway replicas). `principal` is returned for logging only.
message ConsumeQuotaRequest {
  string key_hash = 1; // lowercase sha256 hex, same as AuthenticateApiKey
}

message ConsumeQuotaResponse {
  bool allowed = 1;        // false when the quota is already exhausted
  int64 limit = 2;         // submissions allowed per window (0 = unlimited)
  int64 used = 3;          // submissions used in the current window (after this one)
  string principal = 4;    // owner/tenant label, for logging
  string deny_reason = 5;  // human-readable reason when allowed=false
}

// Gateway → orchestrator: read a principal's prepaid credit balance.
message GetBalanceRequest {
  string principal = 1;
}

message GetBalanceResponse {
  int64 balance = 1;       // current credits (1 credit = 1 cent)
}

// Gateway → orchestrator: read a principal's recent credit ledger (billing page).
message ListLedgerRequest {
  string principal = 1;
  int32 limit = 2;         // max entries (server clamps to [1, 200])
}

// One ledger entry: a signed credit movement (+topup/grant/refund, -debit).
message LedgerEntry {
  int64 delta = 1;
  string reason = 2;       // 'topup:stripe:<session>' | 'debit:wf:<id>' | 'refund:wf:<id>' | 'grant:admin'
  int64 balance_after = 3;
  google.protobuf.Timestamp created_at = 4;
}

message ListLedgerResponse {
  repeated LedgerEntry entries = 1;
}

// One node in the workflow DAG. params is tool-specific and validated by
// the orchestrator against the matching sidecar RunRequest schema.
message Step {
  string id = 1;                       // unique within workflow
  string tool = 2;                     // "rfdiffusion" | "proteinmpnn" | "boltz" | "af2"
  repeated string depends_on = 3;      // step ids; defines DAG edges
  google.protobuf.Struct params = 4;   // free-form tool params
  foldforge.common.v1.ResourceSpec resources = 5;
}

message WorkflowSpec {
  string name = 1;
  repeated Step steps = 2;
  map<string, string> labels = 3;
}

// A designed sequence surfaced inline by an inverse-folding step (ProteinMPNN).
// Carried alongside artifact outputs so a downstream AF2/Boltz step can fold the
// best-scoring sequence without a separate artifact round-trip.
message DesignedSequence {
  string fasta = 1;
  double global_score = 2;   // mean negative log-likelihood, lower is better
  double seq_recovery = 3;
  uint32 sample_index = 4;
}

message StepStatus {
  string step_id = 1;
  foldforge.common.v1.JobState state = 2;
  float fraction = 3;
  repeated foldforge.common.v1.Artifact outputs = 4;
  optional foldforge.common.v1.ErrorDetail error = 5;
  google.protobuf.Timestamp started_at = 6;
  google.protobuf.Timestamp finished_at = 7;
  repeated DesignedSequence sequences = 8;  // inverse-folding outputs (ProteinMPNN)
}

message Workflow {
  string id = 1;
  WorkflowSpec spec = 2;
  foldforge.common.v1.JobState state = 3;
  repeated StepStatus step_statuses = 4;
  google.protobuf.Timestamp created_at = 5;
  google.protobuf.Timestamp updated_at = 6;
}

message SubmitWorkflowRequest {
  WorkflowSpec spec = 1;
  string idempotency_key = 2;          // dedupe retried submissions
}

message GetWorkflowRequest {
  string workflow_id = 1;
}

message StreamWorkflowEventsRequest {
  string workflow_id = 1;
  // Resume after this event id (the SSE Last-Event-ID). 0 = from the beginning
  // (a fresh subscription gets a current snapshot first). Events with a higher
  // id are replayed from durable storage before the live stream is joined, so a
  // client that reconnects after a network blip doesn't miss progress.
  uint64 from_event_id = 2;
}

message ListWorkflowsRequest {
  uint32 page_size = 1;
  string page_token = 2;
  optional foldforge.common.v1.JobState state_filter = 3;
  // Server-side label filter: a workflow matches when its labels contain ALL of
  // these key=value pairs (jsonb containment). Empty = no label filtering.
  map<string, string> label_selector = 4;
}

message ListWorkflowsResponse {
  repeated Workflow workflows = 1;
  string next_page_token = 2;
}

message WorkflowEvent {
  string workflow_id = 1;
  oneof event {
    StepStatus step_update = 2;
    Workflow workflow_update = 3;
  }
  google.protobuf.Timestamp at = 4;
  // Monotonic per-stream id, assigned when the event is persisted. Surfaced to
  // SSE clients as the event id so a reconnect can resume via from_event_id.
  // 0 for synthetic events that are not persisted (e.g. the initial snapshot).
  uint64 event_id = 5;
}
